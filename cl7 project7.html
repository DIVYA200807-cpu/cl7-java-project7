<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
   <h2>RANDOM NUMBERS USING WHILE LOOP.</h2>
   <p id="output"></p>
   <script>
    let count = 0;
    let result = "";

    while(count <8){
        let randomNum = Math.floor(Math.random() *200);
        result += randomNum + "<br>";
        count++;
    }
    document.getElementById("output").innerHTML = result;
   </script> 
</body>
</html>
